{% extends "users/basic.html" %}
{% block title %}Report Review - BookMySeat{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h3 class="mb-3">Report review</h3>
      <div class="card mb-4">
        <div class="card-body">
          <strong>{{ review.user.username }}</strong>
          <p class="mb-0 text-muted">{{ review.review }}</p>
        </div>
      </div>
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label for="{{ form.reason.id_for_label }}">{{ form.reason.label }}</label>
          {{ form.reason }}
        </div>
        <button type="submit" class="btn btn-danger">Submit Report</button>
        <a href="{% url 'movie_detail' review.movie.id %}" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
