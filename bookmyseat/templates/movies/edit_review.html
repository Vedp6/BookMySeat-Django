{% extends "users/basic.html" %}
{% block title %}Edit Review - BookMySeat{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h3 class="mb-4">Edit your review of <em>{{ review.movie.name }}</em></h3>
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label>Rating</label><br>
          {% for radio in form.rating %}
            <label class="mr-3">{{ radio.tag }} {{ radio.choice_label }}</label>
          {% endfor %}
        </div>
        <div class="form-group">
          <label for="{{ form.review.id_for_label }}">Review</label>
          {{ form.review }}
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'movie_detail' review.movie.id %}" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
